<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空室状況モニター</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .card {
            background: #ffffff;
            width: 300px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            transition: opacity 0.3s;
        }
        h2 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 25px;
            color: #2c3e50;
            font-weight: 700;
        }
        .monitor-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .monitor-box {
            flex: 1;
            padding: 15px 10px;
            border-radius: 12px;
        }
        .empty-box { background: #e8f5e9; border: 1px solid #c8e6c9; }
        .ready-box { background: #fff3e0; border: 1px solid #ffe0b2; }
        .label {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 5px;
            display: block;
            font-weight: bold;
        }
        .num {
            font-size: 2.4rem;
            font-weight: 700;
            line-height: 1;
            display: inline-block;
            margin-right: 3px;
        }
        .empty { color: #27ae60; }
        .ready { color: #e67e22; }
        .unit {
            font-size: 1rem;
            color: #7f8c8d;
            vertical-align: bottom;
        }
        .time {
            font-size: 0.75rem;
            color: #7f8c8d;
            background: #f8f9fa;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
        }
        button {
            margin-top: 25px;
            padding: 12px 24px;
            border: none;
            background: #3498db;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.3s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(52,152,219,0.3);
            width: 100%;
        }
        button:hover { background: #2980b9; }
        button:active { transform: translateY(1px); }
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <h2>リアルタイム空室状況</h2>
        
        <div class="monitor-row">
            <div class="monitor-box empty-box">
                <span class="label">空室</span>
                <span id="empty-rooms" class="num empty">-</span><span class="unit">室</span>
            </div>
            <div class="monitor-box ready-box">
                <span class="label">準備中</span>
                <span id="ready-rooms" class="num ready">-</span><span class="unit">室</span>
            </div>
        </div>

        <div id="update-time" class="time">データ未取得</div>
        <button id="update-btn" onclick="fetchStatus()">手動更新</button>
    </div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbwa3HTkFUbvar9KyQjS7hMbNKCVM5BGGmqCJDr5esrXaEqOHLvUR6GqNbsTcZMNY90B/exec";

        function fetchStatus() {
            const card = document.getElementById('main-card');
            const btn = document.getElementById('update-btn');
            const timeEl = document.getElementById('update-time');
            
            // 読み込み中の見た目にする
            if (card) card.classList.add('loading');
            if (btn) btn.innerText = "更新中...";
            if (timeEl) timeEl.innerText = "読み込み中...";
            
            fetch(gasUrl)
                .then(response => response.json())
                .then(data => {
                    if(data.status === "success") {
                        document.getElementById('empty-rooms').innerText = data.empty;
                        document.getElementById('ready-rooms').innerText = data.ready;
                        if (timeEl) timeEl.innerText = "取得日時: " + data.updatedAt;
                    } else {
                        if (timeEl) timeEl.innerText = "エラー: データ抽出失敗";
                    }
                })
                .catch(error => {
                    if (timeEl) timeEl.innerText = "通信エラーが発生しました";
                    console.error(error);
                })
                .finally(() => {
                    // 終わったら元に戻す
                    if (card) card.classList.remove('loading');
                    if (btn) btn.innerText = "手動更新";
                });
        }

        // 起動時に初回読み込み
        fetchStatus();
    </script>
</body>
</html>
